<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">PostgreSQL README hero example</title>
  <desc id="desc">A deep blue composition with a serif title and relational table structure.</desc>
