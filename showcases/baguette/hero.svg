  <title id="title">Baguette README hero concept</title>
  <desc id="desc">A dark device-control hero with iOS simulator frames, a live gesture path, and Swift-orange highlights.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07111F"/><stop offset="1" stop-color="#0B1B31"/></linearGradient>
