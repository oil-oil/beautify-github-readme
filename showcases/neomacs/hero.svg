<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="460" viewBox="0 0 1200 460" role="img" aria-labelledby="title desc">
  <title id="title">Neomacs README hero concept</title>
  <desc id="desc">A restrained black GPU editor composition connecting Emacs Lisp, a Rust core, and GPU rendering.</desc>
  <rect width="1200" height="460" rx="28" fill="#0A0A0D"/>
  <path d="M0 88H1200" stroke="#24242B"/>
  <text x="70" y="54" fill="#777783" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="700" letter-spacing="2">GPU-POWERED EMACS / RUST</text>
  <rect x="1060" y="33" width="70" height="28" rx="14" fill="#2A1D4D"/>
  <text x="1077" y="52" fill="#B79BFF" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700">ALPHA</text>
  <text x="66" y="207" fill="#F2F2F5" font-family="Arial, Helvetica, sans-serif" font-size="76" font-weight="800" letter-spacing="-3">Neomacs</text>
  <rect x="69" y="230" width="72" height="5" rx="2.5" fill="#8B5CF6"/>
  <text x="70" y="278" fill="#B4B4BE" font-family="Arial, Helvetica, sans-serif" font-size="22">A GPU-powered Emacs, rewritten in Rust.</text>
  <text x="70" y="312" fill="#777783" font-family="Arial, Helvetica, sans-serif" font-size="18">Rich media, smooth rendering, familiar Lisp.</text>
  <g transform="translate(70 360)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700">
    <text x="0" y="17" fill="#9B9BA6">ELISP</text><path d="M54 13H100" stroke="#4B4B54"/><circle cx="77" cy="13" r="3" fill="#8B5CF6"/>
    <text x="112" y="17" fill="#9B9BA6">RUST CORE</text><path d="M191 13H237" stroke="#4B4B54"/><circle cx="214" cy="13" r="3" fill="#8B5CF6"/>
    <text x="249" y="17" fill="#F0F0F3">GPU</text>
  </g>
  <g transform="translate(590 116)">
    <rect width="540" height="280" rx="12" fill="#111116" stroke="#303039"/>
    <rect width="540" height="38" rx="12" fill="#1A1A20"/><rect y="20" width="540" height="18" fill="#1A1A20"/>
    <circle cx="20" cy="19" r="5" fill="#494951"/><circle cx="38" cy="19" r="5" fill="#494951"/><circle cx="56" cy="19" r="5" fill="#8B5CF6"/>
    <text x="270" y="24" text-anchor="middle" fill="#777783" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10">*neomacs*</text>
    <rect x="0" y="38" width="42" height="216" fill="#0D0D11"/>
    <g fill="#555560" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" text-anchor="end">
      <text x="30" y="73">1</text><text x="30" y="101">2</text><text x="30" y="129">3</text><text x="30" y="157">4</text><text x="30" y="185">5</text>
    </g>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">
      <text x="62" y="73" fill="#BFAAFF">(neomacs-set-animation-config</text>
      <text x="82" y="101" fill="#E6E6EA">t 15.0 <tspan fill="#9DD7A8">'spring</tspan> 150</text>
      <text x="82" y="129" fill="#E6E6EA">t 200 t 150</text>
      <text x="82" y="157" fill="#E6E6EA">7 2 0.7<tspan fill="#BFAAFF">)</tspan></text>
      <text x="62" y="203" fill="#62626E">;; Lisp in front. GPU underneath.</text>
    </g>
    <rect x="60" y="224" width="9" height="18" fill="#8B5CF6"/>
    <rect y="254" width="540" height="26" rx="0 0 12 12" fill="#8B5CF6"/>
    <text x="14" y="272" fill="#FFF" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700">NEOMACS  ·  GPU  ·  120 FPS</text>
  </g>
</svg>
